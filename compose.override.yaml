
services:
  php:
    volumes:
      - ./:/app
      - symfony_vendor:/app/vendor
      - symfony_var:/app/var
    command: >
      sh -lc "if [ ! -f vendor/autoload.php ]; then composer install --prefer-dist --no-interaction --no-progress; fi && php-fpm"

  nginx:
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  mailer:
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  symfony_vendor:
  symfony_var:
