services:
  php:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
      target: app_runtime
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - path: ./.env
        required: true
      - path: ./.env.prod.local
        required: false
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    volumes:
      - app_var:/app/var
      - app_uploads:/app/public/uploads
    networks:
      - internal

  nginx:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
      target: app_nginx
    restart: unless-stopped
    depends_on:
      - php
    volumes:
      - app_uploads:/app/public/uploads:ro
    networks:
      internal:
      web:
        aliases:
          - portfolio-nginx

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c temp_buffers=8MB
      -c max_connections=40
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  app_uploads:
  app_var:
  database_data:

networks:
  internal:
    internal: true
  web:
    external: true
