server {
    listen 80;
    server_name _;

    root /app/public;
    index index.php;

    client_max_body_size 16m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # EasyAdmin assets are static and should never hit Symfony on miss.
    location ^~ /bundles/ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Front assets may be served by AssetMapper through Symfony in dev.
    location ^~ /assets/ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        fastcgi_read_timeout 60s;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri /index.php$is_args$args;
    }
}
